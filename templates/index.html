<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xpense - Quản lý tài chính thông minh</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .system-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: flex-end;
        }

        .filter-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
        }

        .filter-section input {
            padding: 8px;
            background: #1e293b;
            border: 1px solid var(--border);
            color: white;
            border-radius: 6px;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h1>Xpense</h1>
                    <p style="color: var(--text-muted)">Chào, <span style="color: var(--primary); font-weight: 600;">{{ user.email }}</span> 👋</p>
                </div>
                <div class="system-actions">
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='/logout'" style="background: #ef4444; border-color: #ef4444;">Đăng xuất</button>
                    <button class="btn btn-secondary btn-small" onclick="window.location.href='/backup'">Sao lưu (.json)</button>
                    <button class="btn btn-secondary btn-small" onclick="document.getElementById('importFile').click()">Nhập dữ liệu</button>
                    <input type="file" id="importFile" style="display:none" accept=".db" onchange="importData(this)">
                </div>
            </div>
        </header>

        <section class="summary-cards">
            <div class="card positive">
                <div class="card-label">Tổng thu</div>
                <div class="card-value" id="totalThu">0₫</div>
            </div>
            <div class="card negative">
                <div class="card-label">Tổng chi</div>
                <div class="card-value" id="totalChi">0₫</div>
            </div>
            <div class="card neutral" id="laiCard">
                <div class="card-label">Số dư hiện tại</div>
                <div class="card-value" id="totalLai">0₫</div>
            </div>
        </section>

        <section class="form-section">
            <h3 id="formTitle" style="margin-bottom: 1.5rem; font-weight: 700;">Ghi chép giao dịch</h3>
            <div class="form-grid">
                <input type="hidden" id="editId">
                <input type="text" id="desc" placeholder="Nội dung giao dịch (ví dụ: Lương, Mua sắm...)" required>
                <input type="text" id="amount" placeholder="Số tiền" required>
                <select id="type">
                    <option value="thu">Khoản Thu (+)</option>
                    <option value="chi" selected>Khoản Chi (-)</option>
                </select>
                <input type="date" id="date" required>
            </div>
            <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 10px;">
                <button id="cancelBtn" class="btn btn-secondary" onclick="resetForm()" style="display:none;">Hủy bỏ</button>
                <button class="btn btn-secondary" onclick="exportExcel()">Xuất Excel</button>
                <button id="submitBtn" class="btn btn-primary" onclick="addOrUpdateExpense()">Lưu giao dịch</button>
            </div>
        </section>

        <section class="filter-section">
            <span style="font-size: 14px; font-weight: 600;">Lọc theo ngày:</span>
            <input type="date" id="filterStart">
            <span>→</span>
            <input type="date" id="filterEnd">
            <button class="btn btn-primary btn-small" onclick="applyFilter()">Lọc</button>
            <button class="btn btn-secondary btn-small" onclick="resetFilter()">Xóa lọc</button>
        </section>

        <section class="list-section">
            <h3 style="margin-bottom: 1.5rem; font-weight: 700;">Lịch sử giao dịch</h3>
            <div class="table-container">
                <table id="table">
                    <!-- Table content will be injected by script.js -->
                </table>
            </div>
        </section>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
